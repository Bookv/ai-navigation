<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>站点信息</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <div class="bg"></div>
    <header class="admin-hero">
      <div class="brand">
        <div class="logo">ADMIN</div>
        <div>
          <h1>站点信息</h1>
          <p>修改站点标题、描述与视觉设置</p>
        </div>
      </div>
      <div class="admin-meta">
        <span id="mode-badge" class="badge">检测中</span>
        <span id="status-text" class="muted"></span>
      </div>
    </header>

    <nav class="admin-nav">
      <a href="/admin/engines.html" data-nav="engines">搜索引擎</a>
      <a href="/admin/sites.html" data-nav="sites">网站管理</a>
      <a href="/admin/settings.html" data-nav="settings">站点信息</a>
      <button id="logout-btn" type="button" class="ghost">退出登录</button>
    </nav>

    <main class="admin-main">
      <section id="notice-panel" class="panel notice" hidden>
        <div id="notice-text"></div>
      </section>

      <section class="panel">
        <h2>站点信息</h2>
        <div class="grid">
          <div class="field">
            <label for="site-title">站点标题</label>
            <input id="site-title" type="text" />
          </div>
          <div class="field">
            <label for="site-desc">站点描述</label>
            <input id="site-desc" type="text" />
          </div>
          <div class="field">
            <label for="site-theme">主题</label>
            <select id="site-theme">
              <option value="auto">自动</option>
              <option value="light">浅色</option>
              <option value="dark">深色</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="site-bg">背景图片 URL</label>
          <input id="site-bg" type="text" placeholder="https://example.com/bg.jpg" />
          <div class="helper-text">留空则使用默认渐变背景</div>
          <div class="bg-preview empty">
            <img id="bg-preview" alt="背景预览" />
          </div>
        </div>

        <div class="field">
          <label for="site-glass">卡片透明度（1-100）</label>
          <div class="range-row">
            <input id="site-glass" type="range" min="1" max="100" step="1" />
            <span id="glass-value" class="range-value">62%</span>
          </div>
          <div class="helper-text">数值越低越透明，适合搭配背景图</div>
        </div>

        <div class="actions">
          <button id="save-btn" type="button">保存站点信息</button>
        </div>
      </section>

      <section class="panel">
        <h2>修改密码</h2>
        <div class="grid">
          <div class="field">
            <label for="password-current">当前密码</label>
            <input id="password-current" type="password" />
          </div>
          <div class="field">
            <label for="password-new">新密码（至少 6 位）</label>
            <input id="password-new" type="password" />
          </div>
        </div>
        <div class="actions">
          <button id="password-btn" type="button" class="ghost">更新密码</button>
        </div>
      </section>
    </main>

    <script src="../config.js"></script>
    <script type="module" src="./settings.js"></script>
  </body>
</html>
