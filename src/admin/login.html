<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>后台登录</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <div class="bg"></div>
    <header class="admin-hero">
      <div class="brand">
        <div class="logo">ADMIN</div>
        <div>
          <h1>后台登录</h1>
          <p>登录后进入管理控制台</p>
        </div>
      </div>
      <div class="admin-meta">
        <span id="mode-badge" class="badge">检测中</span>
        <span id="status-text" class="muted"></span>
      </div>
    </header>

    <main class="admin-main">
      <section id="notice-panel" class="panel notice" hidden>
        <div id="notice-text"></div>
      </section>

      <section class="panel">
        <h2>登录</h2>
        <div class="field">
          <label for="login-password">管理密码</label>
          <input id="login-password" type="password" placeholder="输入管理密码" />
        </div>
        <div class="actions">
          <button id="login-btn" type="button">进入管理</button>
        </div>
        <div id="bootstrap-wrap" class="bootstrap" hidden>
          初始密码：<span id="bootstrap-password"></span>
        </div>
      </section>
    </main>

    <script src="../config.js"></script>
    <script type="module" src="./login.js"></script>
  </body>
</html>
