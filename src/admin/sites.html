<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>网站管理</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <div class="bg"></div>
    <header class="admin-hero">
      <div class="brand">
        <div class="logo">ADMIN</div>
        <div>
          <h1>网站管理</h1>
          <p>管理分组、网站与标签</p>
        </div>
      </div>
      <div class="admin-meta">
        <span id="mode-badge" class="badge">检测中</span>
        <span id="status-text" class="muted"></span>
      </div>
    </header>

    <nav class="admin-nav">
      <a href="/admin/engines.html" data-nav="engines">搜索引擎</a>
      <a href="/admin/sites.html" data-nav="sites">网站管理</a>
      <a href="/admin/settings.html" data-nav="settings">站点信息</a>
      <button id="logout-btn" type="button" class="ghost">退出登录</button>
    </nav>

    <main class="admin-main">
      <section id="notice-panel" class="panel notice" hidden>
        <div id="notice-text"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>分组与网站</h2>
          <button id="group-add" type="button" class="ghost">添加分组</button>
        </div>
        <div id="group-list" class="group-list"></div>
        <div class="actions">
          <button id="save-btn" type="button">保存配置</button>
        </div>
      </section>
    </main>

    <script src="../config.js"></script>
    <script type="module" src="./sites.js"></script>
  </body>
</html>
